<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频播放器</title>
    <meta name="description" content="LeLeTV 视频播放器">
    
    <!-- Favicon -->
    <link rel="icon" href="/image/logo.png">
    <link rel="apple-touch-icon" href="/image/logo-black.png">
    <link rel="manifest" href="/manifest.json">
    
    <link rel="stylesheet" href="css/output.css?v=v2.7.3">
    <link rel="stylesheet" href="css/styles.css?v=v2.7.3">
    <link rel="stylesheet" href="css/player.css?v=v2.7.3">
    
    <meta http-equiv="Cache-Control" content="no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>
<body>
    <!-- Aurora 极光背景 -->
    <div id="auroraContainer" class="aurora-bg"></div>
    
    <!-- 密码验证弹窗 -->
    <div id="passwordModal" class="fixed inset-0 bg-black/95 hidden items-center justify-center z-[65] transition-opacity duration-300">
        <div class="bg-[#111] p-8 rounded-lg w-11/12 max-w-md border border-[#333] max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-6 flex-none">
                <h2 class="text-2xl font-bold gradient-text">访问验证</h2>
            </div>
            <div class="mb-6">
                <p class="text-gray-300 mb-4">请输入密码继续访问，如若密码错误可以<span id="contactLeLe4" class="text-blue-400 underline cursor-pointer transition-all duration-300 hover:text-blue-300 hover:underline-offset-2">联系乐乐</span>获取密码</p>
                <form id="passwordForm" onsubmit="handlePasswordSubmit(); return false;">
                    <input type="text" name="username" id="username" autocomplete="username" style="display:none" tabindex="-1" aria-hidden="true">
                    <input type="password" id="passwordInput" class="w-full bg-[#111] border border-[#333] text-white px-4 py-3 rounded-lg focus:outline-none focus:border-white transition-colors" placeholder="密码..." autocomplete="new-password">
                    <button id="passwordSubmitBtn" type="submit" class="mt-4 w-full gradient-btn">提交</button>
                </form>
                <p id="passwordError" class="text-red-500 mt-2 hidden">密码错误，请重试</p>
            </div>
        </div>
    </div>

    <main class="container mx-auto px-4 py-4">
        <div class="player-layout">
            <!-- 左栏：视频播放区 -->
            <div class="player-layout-left">
                <div id="playerContainer" class="player-container">
                    <button onclick="goHome(event)" class="player-back-btn" title="返回首页">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                        </svg>
                    </button>

                    <!-- 锁定按钮（播放器内右侧居中） -->
                    <button id="playerLockBtn" class="player-lock-btn" onclick="toggleControlsLock(event)" title="锁定控制栏">
                        <svg id="lockOpenIcon" class="lock-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"/>
                        </svg>
                        <svg id="lockClosedIcon" class="lock-icon hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                        </svg>
                    </button>

                    <div class="relative">
                        <div id="player" class="player-placeholder">
                            <!-- Initial loading state before JavaScript loads -->
                            <div class="player-loading-overlay">
                                <div class="player-loading-spinner"></div>
                                <div class="player-loading-text" id="loading-title">正在加载视频...</div>
                            </div>
                        </div>
                        <div class="loading-container" id="player-loading" style="display: none;">
                            <div class="loading-spinner"></div>
                            <div>正在加载视频...</div>
                        </div>
                        <div class="error-container" id="error">
                            <div class="error-icon">⚠️</div>
                            <div id="error-message">视频加载失败</div>
                            <div class="error-message-sub">请尝试其他视频源或稍后重试</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右栏：标题+详情 + 选集 + 资源信息 + 控制按钮 -->
            <div class="player-layout-right">
                <!-- 视频标题 + 详情（合并） -->
                <div class="player-detail-info" id="playerDetailInfo">
                    <div class="detail-title-row">
                        <h2 class="player-right-title" id="videoTitleRight">加载中...</h2>
                        <div class="detail-toggle-header" onclick="toggleDetailInfo()">
                            <span class="detail-desc-label">详情</span>
                            <svg class="detail-toggle-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                            </svg>
                        </div>
                    </div>
                    <div class="detail-meta-container" id="detailMetaContainer"></div>
                    <div class="detail-desc-section" id="detailDescSection">
                        <div class="detail-collapse-body" id="detailDescBody"></div>
                    </div>
                </div>

                <!-- 选集区域（可折叠） -->
                <div class="player-container player-right-item episode-section" id="episodeSection">
                    <div class="detail-toggle-header" onclick="toggleEpisodeSection()">
                        <div class="episode-title-group">
                            <h3 class="episode-section-title">选集</h3>
                            <button onclick="event.stopPropagation(); toggleEpisodeOrder()" class="episode-order-btn" title="切换排序">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" id="orderIcon" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-11a1 1 0 10-2 0v3.586L7.707 9.293a1 1 0 00-1.414 1.414l3 3a1 1 0 001.414 0l3-3a1 1 0 00-1.414-1.414L11 10.586V7z" clip-rule="evenodd" />
                                </svg>
                            </button>
                        </div>
                        <div class="episode-header-right">
                            <svg class="detail-toggle-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                            </svg>
                        </div>
                    </div>
                    <div class="episode-collapse-body">
                        <div class="episode-grid" id="episodesGrid">
                            <div class="grid gap-2" id="episodesList">
                                <!-- 集数将在这里动态加载 -->
                                <div class="col-span-full text-center text-gray-400 py-8">加载中...</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 源信息 -->
                <div class="player-container player-right-item flex justify-between py-2 px-4 bg-[#222] border border-[#333] rounded-lg" id="resourceInfoBarContainer">
                    <!-- 资源信息卡片、切换按钮、视频数将由JS动态渲染 -->
                </div>

                <!-- 控制按钮 -->
                <div class="player-container player-right-item">
                    <div class="flex items-center justify-start gap-3 control-buttons-container">
                        <!-- 自动连播开关 -->
                        <div class="flex items-center gap-1 autoplay-container control-btn px-3 py-1 bg-[#222] border border-[#333] rounded-lg transition">
                            <span class="text-gray-400 text-sm whitespace-nowrap">自动连播</span>
                            <label class="switch">
                                <input type="checkbox" id="autoplayToggle">
                                <span class="slider"></span>
                            </label>
                        </div>

                        <!-- 复制链接按钮 -->
                        <button title="复制播放链接" onclick="copyLinks()"
                                class="flex items-center gap-1.5 control-btn px-3 py-1 bg-[#222] border border-[#333] rounded-lg transition hover:bg-[#333]">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 012-2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                            </svg>
                            <span class="text-gray-400 text-sm whitespace-nowrap">复制链接</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 添加快捷键提示元素 -->
    <div class="shortcut-hint" id="shortcutHint">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" id="shortcutIcon">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
        </svg>
        <span id="shortcutText"></span>
    </div>

    <!-- 换源模态框 -->
    <div id="modal" class="fixed inset-0 bg-black/60 items-center justify-center transition-opacity duration-300 z-[10000] hidden">
        <div class="bg-[#111] p-8 rounded-lg w-11/12 max-w-4xl border border-[#333] max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-6 flex-none">
                <h2 id="modalTitle" class="text-2xl font-bold gradient-text break-words pr-4 max-w-[80%]"></h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white text-2xl transition-colors flex-shrink-0">&times;</button>
            </div>
            <div id="modalContent" class="overflow-auto flex-1 min-h-0">
                <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-2">
                </div>
            </div>
        </div>
    </div>

    <!-- 统一的提示框 -->
    <div id="toast" class="fixed bottom-20 left-1/2 -translate-x-1/2 text-white px-5 py-2.5 shadow-lg transform transition-all duration-300 opacity-0 scale-50 z-50 pointer-events-none">
        <p id="toastMessage"></p>
    </div>

    <!-- 添加 loading 提示框 -->
    <div id="loading" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-[10001]">
        <div class="bg-[#111] p-8 rounded-lg border border-[#333] flex items-center space-x-4">
            <div class="w-8 h-8 border-4 border-white border-t-transparent rounded-full animate-spin"></div>
            <p class="text-white text-lg">加载中...</p>
        </div>
    </div>

    <!-- 引入纯 JS sha256（HTTP 下依然可用） -->
    <script src="libs/sha256.min.js?v=v2.7.3"></script>
    <script>
        // 保存原始 js‑sha256 实现，避免被 password.js 覆盖
        window._jsSha256 = window.sha256;
    </script>
    
    <script src="libs/hls.min.js?v=v2.7.3" defer crossorigin="anonymous"></script>
    <script src="libs/artplayer.min.js?v=v2.7.3" defer crossorigin="anonymous"></script>

    <script src="js/config.js?v=v2.7.3" defer></script>
    <script src="js/proxy-auth.js?v=v2.7.3" defer></script>
    <script src="js/password.js?v=v2.7.3" defer></script>
    <script src="js/ui.js?v=v2.7.3" defer></script>
    <script src="js/api.js?v=v2.7.3" defer></script>
    <script src="js/search.js?v=v2.7.3" defer></script>
    <script src="js/player.js?v=v2.7.3" defer></script>

    <script>
        // 创建全局环境变量对象
        window.__ENV__ = window.__ENV__ || {};
        
        // 注入服务器端环境变量 (将由服务器端替换)
        // PASSWORD 变量将在这里被服务器端注入
        window.__ENV__.PASSWORD = "{{PASSWORD}}";
        window.__LELETV_VERSION__ = "v2.7.3";

        // 确保首页按钮功能正常
        function ensureGoHome() {
            if (typeof goHome !== 'function') {
                window.goHome = function(event) {
                    if (event) event.preventDefault();
                    try {
                        window.location.href = '/';
                    } catch (e) {
                        window.location.assign('/');
                    }
                };
            }
        }
        
        // 页面加载后立即执行
        ensureGoHome();
        
        // DOM加载完成后再次确保
        document.addEventListener('DOMContentLoaded', ensureGoHome);


    </script>
    <!-- 版本更新检测模块 -->
    <script src="js/version-updater.js?v=v2.7.3" defer></script>
    <!-- 缓存管理模块 -->
    <script src="js/cache-manager.js?v=v2.7.3" defer></script>
    <script src="js/aurora-bg.js?v=v2.7.3"></script>
    <script src="js/app.js?v=v2.7.3" defer></script>
    <script>
        // 初始化邮箱点击处理器
        document.addEventListener('DOMContentLoaded', function() {
            initAurora({
                selector: '#auroraContainer',
                colorStops: ['#3A29FF', '#ec4899', '#FFD700'],
                amplitude: 0.5,
                blend: 0.8,
                speed: 0.5
            });
            if (typeof setupEmailClickHandlers === 'function') {
                setupEmailClickHandlers();
            }
        });
    </script>
</body>
</html>
