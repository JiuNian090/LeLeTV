    <!-- 关键CSS内联以提高首屏渲染速度 -->
    <style>
        /* 关键CSS - 内限以减少首屏渲染阻塞 */
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; }
        .page-bg { background-color: #000; color: #fff; }
        .gradient-text { background: linear-gradient(90deg, #00ccff, #0e76a8, #00ccff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .hidden { display: none; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 1rem; }
        .flex { display: flex; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .text-center { text-align: center; }
        .text-white { color: #fff; }
        .text-gray-400 { color: #9ca3af; }
        .text-gray-500 { color: #6b7280; }
        .text-xl { font-size: 1.25rem; }
        .font-bold { font-weight: 700; }
        .mb-4 { margin-bottom: 1rem; }
        .mt-2 { margin-top: 0.5rem; }
        .py-4 { padding-top: 1rem; padding-bottom: 1rem; }
        .px-4 { padding-left: 1rem; padding-right: 1rem; }
        .w-full { width: 100%; }
        .relative { position: relative; }
        .fixed { position: fixed; }
        .inset-0 { top: 0; right: 0; bottom: 0; left: 0; }
        .z-50 { z-index: 50; }
        .bg-black { background-color: #000; }
        .bg-\[\#111\] { background-color: #111; }
        .border { border: 1px solid; }
        .border-\[\#333\] { border-color: #333; }
        .border-t { border-top: 1px solid; }
        .rounded-lg { border-radius: 0.5rem; }
        .transition-all { transition-property: all; transition-duration: 150ms; }
        .duration-300 { transition-duration: 300ms; }
        /* 重定向页面关键样式 */
        .redirect-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .logo-container { display: flex; align-items: center; margin-bottom: 2rem; }
        .logo-icon { width: 3rem; height: 3rem; margin-right: 1rem; color: #00ccff; }
        .logo-text { font-size: 2rem; font-weight: 700; }
        .loading-animation { width: 3rem; height: 3rem; border: 4px solid #333; border-top: 4px solid #00ccff; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 2rem; }
        .redirect-message { font-size: 1.25rem; margin-bottom: 1rem; }
        .redirect-hint { font-size: 0.875rem; color: #9ca3af; }
        .redirect-hint a { color: #00ccff; text-decoration: underline; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
